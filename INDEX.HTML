<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Style Main Page</title>
    <link rel="stylesheet" href="STYLE.CSS">
</head>
<body>
    <header class="main-header">
        <div class="logo">NETFLIX</div>
        <nav class="main-nav">
            <ul>
                <li>홈</li>
                <li>시리즈</li>
                <li>영화</li>
                <li>최신 콘텐츠</li>
                <li>내가 찜한 콘텐츠</li>
            </ul>
        </nav>
        <div class="user-menu">
            <span>검색</span>
            <span>알림</span>
            <span>프로필</span>
        </div>
    </header>

    <main>
        <section class="banner">
            <div class="banner-content">
                <h1 class="banner-title">대표 콘텐츠 제목</h1>
                <p class="banner-description">이 콘텐츠에 대한 간략한 설명이 여기에 들어갑니다. 레이아웃 구성을 위한 샘플 텍스트입니다.</p>
                <div class="banner-buttons">
                    <button class="btn-play">재생</button>
                    <button class="btn-info">상세 정보</button>
                </div>
            </div>
        </section>

        <section class="content-row">
            <h2 class="row-title">지금 뜨는 콘텐츠</h2>
            <div class="card-container">
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="지금 뜨는 콘텐츠 포스터 1"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="지금 뜨는 콘텐츠 포스터 2"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="지금 뜨는 콘텐츠 포스터 3"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="지금 뜨는 콘텐츠 포스터 4"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="지금 뜨는 콘텐츠 포스터 5"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="지금 뜨는 콘텐츠 포스터 6"></article>
            </div>
        </section>

        <section class="content-row">
            <h2 class="row-title">넷플릭스 오리지널</h2>
            <div class="card-container">
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="넷플릭스 오리지널 포스터 1"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="넷플릭스 오리지널 포스터 2"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="넷플릭스 오리지널 포스터 3"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="넷플릭스 오리지널 포스터 4"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="넷플릭스 오리지널 포스터 5"></article>
                <article class="card"><img src="https://via.placeholder.com/200x300" alt="넷플릭스 오리지널 포스터 6"></article>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-links">
            <ul>
                <li>자막 및 음성</li>
                <li>미디어 센터</li>
                <li>개인정보</li>
                <li>문의하기</li>
            </ul>
        </div>
        <div class="footer-info">
            네플릭스 시버소 (율)
        </div>
    </footer>
</body>
</html>
